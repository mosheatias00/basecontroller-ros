; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -DICM_20948_USE_DMP=1
; Serial Monitor settings for your Mac
monitor_speed = 115200
upload_speed = 115200

; Locked to the currently detected ESP32 serial port.
upload_port = /dev/cu.wchusbserial58750040011
monitor_port = /dev/cu.wchusbserial58750040011

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    wollewald/INA219_WE @ ^1.4.1
    madhephaestus/ESP32Encoder @ ^0.12.0
    denyssene/SimpleKalmanFilter @ ^0.1.0
    sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library @ ^1.3.2
    https://github.com/imax9000/Arduino-PID-Library.git

; === OTA UPLOAD CONFIGURATION ===
; To upload via WiFi instead of Serial:
; 
; 1. Find your ESP32 IP address from the device logs or web interface
; 2. Update the upload_port below with YOUR_ESP32_IP
;
[env:esp32dev-ota]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -DICM_20948_USE_DMP=1
upload_protocol = espota
upload_port = 192.168.1.110
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    wollewald/INA219_WE @ ^1.4.1
    madhephaestus/ESP32Encoder @ ^0.12.0
    denyssene/SimpleKalmanFilter @ ^0.1.0
    sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library @ ^1.3.2
    https://github.com/imax9000/Arduino-PID-Library.git
; 
; 3. Then upload with:
;    platformio run -e esp32dev-ota -t upload
;
; Alternatively, set upload_port to IP on command line:
;    platformio run -t upload --upload-port=192.168.x.x